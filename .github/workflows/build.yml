name: "publish"

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    env:
      OPENSSL_DIR: ${{ contains(matrix.platform, 'macos') && (runner.arch == 'ARM64' && '/opt/homebrew/opt/openssl@3' || '/usr/local/opt/openssl@3') || '' }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libnm-dev libcloudproviders-dev librsvg2-dev build-essential curl wget libssl-dev libayatana-appindicator3-dev libsoup-3.0-dev

      - name: install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }} # uses the tag name that triggered the workflow
          releaseName: "Network Process ${{ github.ref_name }}"
          releaseBody: "Automated release of Network Process ${{ github.ref_name }}."
          releaseDraft: false
          prerelease: false
